<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EduTrack — Forgot Password</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>body { display:block; background:#F9FAFB; }</style>
</head>
<body>

<div class="auth-page">
  <div class="auth-box">

    <div class="auth-brand"><div class="auth-brand-dot"></div>EduTrack</div>
    <h2 class="auth-title">Forgot Password?</h2>
    <p class="auth-sub">Enter your email and we will send you a reset link.</p>

    <div class="auth-error"   id="fpError">No account found with this email.</div>
    <div class="auth-success" id="fpSuccess">Reset link sent! Check your inbox.</div>

    <form id="forgotForm" novalidate>
      <div class="form-group">
        <label class="form-label" for="fpEmail">Email Address *</label>
        <input class="form-control" id="fpEmail" type="email" placeholder="you@edutrack.edu.pk" />
        <span class="form-err" id="fpEmailErr">Enter a valid email address.</span>
      </div>

      <div class="auth-divider"></div>

      <button type="submit" class="btn btn-primary" style="width:100%;padding:10px;font-size:14px;">Send Reset Link</button>
    </form>

    <div class="auth-footer" style="margin-top:14px;">
      <a href="login.html">&#8592; Back to Sign In</a>
    </div>

  </div>
</div>

<div id="toast-wrap"></div>
<script>
'use strict';

function showToast(msg, type='info') {
  const icons = {success:'✓',error:'✕',info:'i'};
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.innerHTML = `<strong>${icons[type]}</strong> ${msg}`;
  document.getElementById('toast-wrap').appendChild(t);
  setTimeout(() => t.remove(), 3500);
}

document.getElementById('forgotForm').addEventListener('submit', function(e) {
  e.preventDefault();
  const email    = document.getElementById('fpEmail');
  const emailErr = document.getElementById('fpEmailErr');
  const errBox   = document.getElementById('fpError');
  const sucBox   = document.getElementById('fpSuccess');
  errBox.classList.remove('show');
  sucBox.classList.remove('show');

  if (!email.value.trim() || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email.value)) {
    email.classList.add('error'); emailErr.classList.add('show'); return;
  }
  email.classList.remove('error'); emailErr.classList.remove('show');

  // Simulate check — accept any valid email format
  localStorage.setItem('edutrack_reset_email', email.value);
  sucBox.classList.add('show');
  showToast('Reset link sent to ' + email.value, 'success');
  setTimeout(() => { window.location.href = 'reset-password.html'; }, 2000);
});

document.getElementById('fpEmail').addEventListener('input', function() {
  this.classList.remove('error');
  document.getElementById('fpEmailErr').classList.remove('show');
  document.getElementById('fpError').classList.remove('show');
});
</script>
</body>
</html>
