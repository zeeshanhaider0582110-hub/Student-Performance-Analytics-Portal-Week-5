<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EduTrack — Reset Password</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>body { display:block; background:#F9FAFB; }</style>
</head>
<body>

<div class="auth-page">
  <div class="auth-box">

    <div class="auth-brand"><div class="auth-brand-dot"></div>EduTrack</div>
    <h2 class="auth-title">Reset Password</h2>
    <p class="auth-sub" id="resetSub">Create a new password for your account.</p>

    <div class="auth-success" id="resetSuccess">Password reset successfully! Redirecting to login…</div>

    <form id="resetForm" novalidate>
      <div class="form-group">
        <label class="form-label" for="newPass">New Password *</label>
        <div class="password-wrap">
          <input class="form-control" id="newPass" type="password" placeholder="Min. 8 characters" />
          <button type="button" class="toggle-pass" id="toggleNew">&#128065;</button>
        </div>
        <div class="pwd-strength">
          <div class="pwd-bar" id="rBar1"></div>
          <div class="pwd-bar" id="rBar2"></div>
          <div class="pwd-bar" id="rBar3"></div>
        </div>
        <div class="pwd-label" id="rPwdLabel">Enter a new password</div>
        <span class="form-err" id="newPassErr">Password must be at least 8 characters.</span>
      </div>

      <div class="form-group" style="margin-top:14px;">
        <label class="form-label" for="confirmPass">Confirm New Password *</label>
        <div class="password-wrap">
          <input class="form-control" id="confirmPass" type="password" placeholder="Repeat password" />
          <button type="button" class="toggle-pass" id="toggleConfirm">&#128065;</button>
        </div>
        <span class="form-err" id="confirmPassErr">Passwords do not match.</span>
      </div>

      <div class="auth-divider"></div>

      <button type="submit" class="btn btn-primary" style="width:100%;padding:10px;font-size:14px;">Reset Password</button>
    </form>

    <div class="auth-footer" style="margin-top:14px;">
      <a href="login.html">&#8592; Back to Sign In</a>
    </div>

  </div>
</div>

<div id="toast-wrap"></div>
<script>
'use strict';

function showToast(msg, type='info') {
  const icons = {success:'✓',error:'✕',info:'i'};
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.innerHTML = `<strong>${icons[type]}</strong> ${msg}`;
  document.getElementById('toast-wrap').appendChild(t);
  setTimeout(() => t.remove(), 3500);
}

// Show email in subtitle
const resetEmail = localStorage.getItem('edutrack_reset_email');
if (resetEmail) {
  document.getElementById('resetSub').textContent = 'Create a new password for ' + resetEmail;
}

// Toggle password
function togglePass(btnId, inputId) {
  document.getElementById(btnId).addEventListener('click', function() {
    const inp = document.getElementById(inputId);
    inp.type = inp.type === 'password' ? 'text' : 'password';
    this.innerHTML = inp.type === 'password' ? '&#128065;' : '&#128064;';
  });
}
togglePass('toggleNew', 'newPass');
togglePass('toggleConfirm', 'confirmPass');

// Password strength
document.getElementById('newPass').addEventListener('input', function() {
  const val = this.value;
  const bars = [document.getElementById('rBar1'), document.getElementById('rBar2'), document.getElementById('rBar3')];
  const label = document.getElementById('rPwdLabel');
  bars.forEach(b => b.className = 'pwd-bar');

  if (!val) { label.textContent = 'Enter a new password'; }
  else if (val.length < 6) {
    bars[0].classList.add('weak');
    label.textContent = 'Weak'; label.style.color = 'var(--red)';
  } else if (val.length < 10) {
    bars[0].classList.add('medium'); bars[1].classList.add('medium');
    label.textContent = 'Medium'; label.style.color = 'var(--amber)';
  } else {
    bars.forEach(b => b.classList.add('strong'));
    label.textContent = 'Strong'; label.style.color = 'var(--green)';
  }
});

// Form submit
document.getElementById('resetForm').addEventListener('submit', function(e) {
  e.preventDefault();
  let valid = true;
  const np = document.getElementById('newPass');
  const cp = document.getElementById('confirmPass');

  if (!np.value || np.value.length < 8) {
    np.classList.add('error'); document.getElementById('newPassErr').classList.add('show'); valid = false;
  } else { np.classList.remove('error'); document.getElementById('newPassErr').classList.remove('show'); }

  if (!cp.value || cp.value !== np.value) {
    cp.classList.add('error'); document.getElementById('confirmPassErr').classList.add('show'); valid = false;
  } else { cp.classList.remove('error'); document.getElementById('confirmPassErr').classList.remove('show'); }

  if (!valid) return;

  // Save new password to localStorage (simulation)
  localStorage.setItem('edutrack_password', np.value);
  localStorage.removeItem('edutrack_reset_email');

  document.getElementById('resetSuccess').classList.add('show');
  showToast('Password reset successfully!', 'success');
  setTimeout(() => { window.location.href = 'login.html'; }, 2000);
});
</script>
</body>
</html>
