<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EduTrack — Login</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    body { display: block; background: #F9FAFB; }
  </style>
</head>
<body>

<div class="login-page">
  <div class="login-box">

    <div class="login-brand">
      <div class="brand-dot" style="width:10px;height:10px;background:#2563EB;border-radius:50%;flex-shrink:0;"></div>
      EduTrack
    </div>
    <div class="login-sub">Student Performance Analytics Portal</div>

    <h2>Welcome back</h2>
    <p style="font-size:13px;color:var(--text-2);margin-bottom:20px;">Sign in to access your portal</p>

    <div class="login-error" id="loginError">
      Incorrect email or password. Please try again.
    </div>

    <form id="loginForm" novalidate>

      <div class="form-group" style="margin-bottom:14px;">
        <label class="form-label" for="loginEmail">Email Address *</label>
        <input class="form-control" id="loginEmail" type="email" placeholder="you@edutrack.edu.pk" autocomplete="email" />
        <span class="form-err" id="loginEmailErr">Email is required.</span>
      </div>

      <div class="form-group" style="margin-bottom:6px;">
        <label class="form-label" for="loginPassword">Password *</label>
        <div class="password-wrap">
          <input class="form-control" id="loginPassword" type="password" placeholder="Enter your password" autocomplete="current-password" />
          <button type="button" class="toggle-pass" id="togglePass" title="Show password">&#128065;</button>
        </div>
        <span class="form-err" id="loginPasswordErr">Password is required.</span>
      </div>

      <div class="remember-row">
        <label>
          <input type="checkbox" id="rememberMe" />
          Remember me
        </label>
        <a href="forgot-password.html">Forgot password?</a>
      </div>

      <div class="login-divider"></div>

      <div style="margin-bottom:16px;">
        <label class="form-label" style="margin-bottom:8px;display:block;">Sign in as</label>
        <div class="role-selector">
          <div class="role-option selected" data-role="administrator" onclick="selectRole(this)">
            <span class="role-icon">🛡️</span>
            Administrator
          </div>
          <div class="role-option" data-role="teacher" onclick="selectRole(this)">
            <span class="role-icon">📚</span>
            Teacher
          </div>
          <div class="role-option" data-role="student" onclick="selectRole(this)">
            <span class="role-icon">🎓</span>
            Student
          </div>
        </div>
      </div>

      <button type="submit" class="btn btn-primary login-btn">Sign In</button>

    </form>

    <div class="login-footer">
      Don't have an account? <a href="register.html">Create one</a>
    </div>

  </div>
</div>

<div id="toast-wrap"></div>
<script>
'use strict';

// Theme init — apply saved theme immediately
(function() {
  var t = localStorage.getItem('edutrack_theme') || 'light';
  document.documentElement.setAttribute('data-theme', t);
})();

// Toast
function showToast(msg, type) {
  type = type || 'info';
  var icons = { success: '✓', error: '✕', info: 'i' };
  var t = document.createElement('div');
  t.className = 'toast ' + type;
  t.innerHTML = '<strong>' + (icons[type] || 'i') + '</strong> ' + msg;
  document.getElementById('toast-wrap').appendChild(t);
  setTimeout(function() { t.remove(); }, 3500);
}

// Toggle password visibility
document.getElementById('togglePass').addEventListener('click', function() {
  var pwd = document.getElementById('loginPassword');
  if (pwd.type === 'password') {
    pwd.type = 'text';
    this.innerHTML = '&#128064;';
    this.title = 'Hide password';
  } else {
    pwd.type = 'password';
    this.innerHTML = '&#128065;';
    this.title = 'Show password';
  }
});

// Role selector
function selectRole(el) {
  document.querySelectorAll('.role-option').forEach(function(o) {
    o.classList.remove('selected');
  });
  el.classList.add('selected');
}

// Login form submit
document.getElementById('loginForm').addEventListener('submit', function(e) {
  e.preventDefault();

  var valid    = true;
  var errorBox = document.getElementById('loginError');
  errorBox.classList.remove('show');

  var email    = document.getElementById('loginEmail');
  var emailErr = document.getElementById('loginEmailErr');
  var pass     = document.getElementById('loginPassword');
  var passErr  = document.getElementById('loginPasswordErr');

  // Validate email
  if (!email.value.trim()) {
    email.classList.add('error');
    emailErr.textContent = 'Email is required.';
    emailErr.classList.add('show');
    valid = false;
  } else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email.value)) {
    email.classList.add('error');
    emailErr.textContent = 'Enter a valid email address.';
    emailErr.classList.add('show');
    valid = false;
  } else {
    email.classList.remove('error');
    emailErr.classList.remove('show');
  }

  // Validate password
  if (!pass.value.trim()) {
    pass.classList.add('error');
    passErr.textContent = 'Password is required.';
    passErr.classList.add('show');
    valid = false;
  } else if (pass.value.length < 6) {
    pass.classList.add('error');
    passErr.textContent = 'Password must be at least 6 characters.';
    passErr.classList.add('show');
    valid = false;
  } else {
    pass.classList.remove('error');
    passErr.classList.remove('show');
  }

  if (!valid) return;

  // Check credentials
  var validEmail = 'zeeshan@edutrack.edu.pk';
  var validPass  = 'edutrack2026';

  if (email.value.trim() === validEmail && pass.value === validPass) {

    // Save session and role
    sessionStorage.setItem('loggedIn', 'true');
    var selected = document.querySelector('.role-option.selected');
    var role = selected ? selected.dataset.role : 'administrator';
    localStorage.setItem('edutrack_role', role);

    // Role-based redirect
    var roleUrls = {
      administrator: 'admin-dashboard.html',
      teacher:       'teacher-dashboard.html',
      student:       'student-dashboard.html'
    };
    var redirectUrl = roleUrls[role] || 'admin-dashboard.html';

    showToast('Login successful! Redirecting…', 'success');
    setTimeout(function() {
      window.location.href = redirectUrl;
    }, 1200);

  } else {
    errorBox.classList.add('show');
    email.classList.add('error');
    pass.classList.add('error');
  }
});

// Clear errors on input
['loginEmail', 'loginPassword'].forEach(function(id) {
  document.getElementById(id).addEventListener('input', function() {
    this.classList.remove('error');
    var err = document.getElementById(id + 'Err');
    if (err) err.classList.remove('show');
    document.getElementById('loginError').classList.remove('show');
  });
});
</script>
</body>
</html>
